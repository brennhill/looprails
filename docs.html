<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="LoopRails documentation: the practitioner playbook, the full framework, and the 366-source research codex.">

<meta property="og:description" content="The practitioner playbook, the full framework, and the 366-source research codex.">
<meta property="og:image" content="https://looprails.dev/og.png">

<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#0e7c86">
<style>
:root{
  --ink:#0d1117;--ink-2:#33404d;--muted:#5b6b7a;--line:#e3e6ea;
  --bg:#fff;--bg-2:#f6f8f9;--rail:#0e7c86;--rail-2:#0b5e66;--rail-tint:#e3f3f4;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.6}
a{color:var(--rail);text-decoration:none}a:hover{text-decoration:underline}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;padding:11px 20px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.brand:hover{text-decoration:none}
.docpick{margin-left:auto;display:flex;gap:6px}
.docpick a{font-size:.88rem;font-weight:600;color:var(--ink-2);padding:6px 12px;border-radius:8px;border:1px solid transparent}
.docpick a.on{background:var(--rail);color:#fff}
.docpick a:hover{text-decoration:none;border-color:var(--line)}
.layout{display:grid;grid-template-columns:270px 1fr;gap:0;max-width:1280px;margin:0 auto}
@media(max-width:920px){.layout{grid-template-columns:1fr}.toc{display:none}}
.toc{position:sticky;top:53px;align-self:start;height:calc(100vh - 53px);overflow:auto;padding:24px 14px 60px 22px;border-right:1px solid var(--line)}
.toc .tt{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
.toc a{display:block;font-size:.85rem;color:var(--ink-2);padding:3px 0;border-left:2px solid transparent;padding-left:10px;margin-left:-2px}
.toc a:hover{color:var(--rail);text-decoration:none}
.toc a.h3{padding-left:22px;font-size:.8rem;color:var(--muted)}
.toc a.active{color:var(--rail);border-left-color:var(--rail);font-weight:600}
.content{padding:34px 40px 120px;min-width:0;max-width:860px}
@media(max-width:640px){.content{padding:24px 20px 90px}}
.loading{color:var(--muted);font-family:var(--mono);padding:40px 0}
.fallback{border:1px solid #f6c9d2;background:#fde7eb;border-radius:12px;padding:18px;color:#8a1f33}
/* markdown styles */
.md h1{font-size:2rem;letter-spacing:-.02em;margin:.2em 0 .5em;line-height:1.15}
.md h2{font-size:1.5rem;letter-spacing:-.01em;margin:1.7em 0 .5em;padding-top:.4em;border-top:1px solid var(--line)}
.md h3{font-size:1.16rem;margin:1.4em 0 .4em}
.md h4{font-size:1rem;margin:1.2em 0 .3em;color:var(--ink-2)}
.md p{margin:0 0 1em}
.md ul,.md ol{padding-left:1.3em;margin:0 0 1em}
.md li{margin:.25em 0}
.md blockquote{margin:1em 0;padding:.6em 1em;border-left:3px solid var(--rail);background:var(--rail-tint);border-radius:0 8px 8px 0;color:var(--ink-2)}
.md blockquote p{margin:.3em 0}
.md code{font-family:var(--mono);font-size:.86em;background:var(--bg-2);padding:2px 6px;border-radius:5px;border:1px solid var(--line)}
.md pre{background:#0c1620;color:#dfeef0;padding:16px;border-radius:10px;overflow:auto;font-size:.82rem;line-height:1.45}
.md pre code{background:none;border:none;padding:0;color:inherit}
.md a{font-weight:500}
.md hr{border:none;border-top:1px solid var(--line);margin:2em 0}
.md table{border-collapse:collapse;width:100%;margin:0 0 1.3em;font-size:.9rem;display:block;overflow-x:auto}
.md th,.md td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
.md th{background:var(--bg-2);font-weight:700}
.md tr:nth-child(even) td{background:#fafbfc}
.md img{max-width:100%}
.md strong{font-weight:700}
:target{scroll-margin-top:64px}
.gh-link{display:inline-block;margin:8px 0 24px;font-size:.85rem;font-family:var(--mono)}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="index.html">
    <svg width="24" height="24" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#0e7c86"/><g stroke="#fff" stroke-width="2.4" stroke-linecap="round"><line x1="9" y1="6" x2="9" y2="26"/><line x1="23" y1="6" x2="23" y2="26"/><line x1="6" y1="12" x2="26" y2="12"/><line x1="6" y1="20" x2="26" y2="20"/></g></svg>
    LoopRails
  </a>
  <nav class="docpick" id="docpick"></nav>
</div>

<div class="layout">
  <aside class="toc"><div class="tt">On this page</div><div id="toc"></div></aside>
  <main class="content"><div id="md" class="md"><div class="loading">Loading…</div></div></main>
</div>

<footer style="border-top:1px solid var(--line);padding:22px;color:var(--muted);font-size:.85rem;display:flex;gap:16px;flex-wrap:wrap;justify-content:space-between;max-width:1280px;margin:0 auto">
  <span>© 2026 <a href="https://www.linkedin.com/in/brennhill/">Brenn Hill</a> · all rights reserved</span>
  <span><a href="index.html">Home</a> · <a href="https://github.com/brennhill/looprails">GitHub</a> · <a href="https://www.linkedin.com/in/brennhill/">LinkedIn</a></span>
</footer>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
const DOCS={
  playbook:{file:"playbook.md",label:"Playbook"},
  framework:{file:"framework.md",label:"Framework"},
  codex:{file:"codex.md",label:"Codex"},
  readme:{file:"README.md",label:"Overview"},
  g0:{file:"guide-g0.md",label:"G0 · Trivial"},
  g1:{file:"guide-g1.md",label:"G1 · Low"},
  g2:{file:"guide-g2.md",label:"G2 · High"},
  g3:{file:"guide-g3.md",label:"G3 · Critical"},
  "rail-r":{file:"rail-reversible.md",label:"Reversible"},
  "rail-a":{file:"rail-authorized.md",label:"Authorized"},
  "rail-i":{file:"rail-interruptible.md",label:"Interruptible"},
  "rail-l":{file:"rail-logged.md",label:"Logged"}
};
const REPO="https://github.com/brennhill/looprails/blob/main/";
const params=new URLSearchParams(location.search);
let current=DOCS[params.get("doc")]?params.get("doc"):"playbook";

// build doc switcher
document.getElementById("docpick").innerHTML=Object.entries(DOCS)
  .filter(([k])=>["playbook","framework","codex"].includes(k))
  .map(([k,d])=>`<a href="?doc=${k}" class="${k===current?'on':''}">${d.label}</a>`).join("");

function slug(s){return s.toLowerCase().replace(/[^\w\s-]/g,"").trim().replace(/\s+/g,"-").slice(0,60)}

async function load(){
  const d=DOCS[current];
  const mdEl=document.getElementById("md");
  try{
    const res=await fetch(d.file,{cache:"no-cache"});
    if(!res.ok) throw new Error(res.status);
    const text=await res.text();
    if(typeof marked==="undefined") throw new Error("renderer");
    marked.setOptions({gfm:true,breaks:false});
    mdEl.innerHTML=`<a class="gh-link" href="${REPO}${d.file}">View ${d.file} on GitHub ↗</a>`+marked.parse(text);
    addAnchors(); buildTOC(); scrollToHash();
  }catch(err){
    mdEl.innerHTML=`<div class="fallback"><b>This page can't load the document here.</b> The reader needs to be opened over http (for example via GitHub Pages or a local server); it can't read the markdown file when the page is opened directly from disk (a <code>file://</code> address).<br><br>
      You can read it on GitHub instead: <a href="${REPO}${d.file}">${d.file} ↗</a></div>`;
    document.getElementById("toc").innerHTML="";
  }
}
function addAnchors(){
  document.querySelectorAll("#md h1, #md h2, #md h3").forEach(h=>{
    if(!h.id) h.id=slug(h.textContent);
  });
}
function buildTOC(){
  const heads=[...document.querySelectorAll("#md h2, #md h3")];
  document.getElementById("toc").innerHTML=heads.map(h=>
    `<a href="#${h.id}" class="${h.tagName==='H3'?'h3':''}" data-id="${h.id}">${h.textContent.replace(/^[0-9.IVX]+\s*[—.]?\s*/,'')}</a>`
  ).join("");
  // scroll-spy
  const spy=new IntersectionObserver((es)=>{
    es.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll("#toc a").forEach(a=>a.classList.toggle("active",a.dataset.id===e.target.id));
      }
    });
  },{rootMargin:"-60px 0px -75% 0px"});
  heads.forEach(h=>spy.observe(h));
}
function scrollToHash(){ if(location.hash){const el=document.getElementById(location.hash.slice(1));if(el)el.scrollIntoView()} }
load();
</script>
</body>
</html>
